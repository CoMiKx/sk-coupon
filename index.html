<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK Re:Birth — Bulk Coupon Redeemer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent2: #3b82f6;
      --gold: #d97706;
      --text: #0f172a;
      --muted: #64748b;
      --success: #10b981;
      --warn: #ea580c;
      --info: #3b82f6;
      --font-head: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --font-body: 'Exo 2', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      line-height: 1;
    }

    .header h1 span {
      color: var(--accent2);
    }

    .header p {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: 4px;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.05);
    }

    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Textarea */
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .count-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gold);
      margin-top: 6px;
    }

    /* Settings row */
    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .settings-row {
        grid-template-columns: 1fr;
      }
    }

    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .field select option {
      background: var(--surface2);
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      padding: 11px 24px;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 0 rgba(200, 57, 43, 0);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent2);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface2);
    }

    .btn-stop {
      background: #fff1f2;
      color: #e11d48;
      border: 1px solid #fda4af;
    }

    .btn-stop:hover {
      background: #ffe4e6;
    }

    /* Progress */
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-header span {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius: 99px;
      transition: width .3s ease;
      width: 0%;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: bold;
    }

    .stat-value.success {
      color: var(--success);
    }

    .stat-value.fail {
      color: var(--accent2);
    }

    .stat-value.skip {
      color: var(--warn);
    }

    .stat-value.total {
      color: var(--gold);
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    /* Results table */
    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-family: var(--font-mono);
    }

    th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--muted);
      font-weight: normal;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 7px 12px;
      border-bottom: 1px solid rgba(42, 48, 80, 0.5);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .tag-SUCCESS {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .tag-FAIL {
      background: rgba(234, 88, 12, 0.1);
      color: var(--warn);
      border: 1px solid rgba(234, 88, 12, 0.2);
    }

    .tag-SKIP {
      background: rgba(245, 158, 11, 0.1);
      color: var(--gold);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    /* Spinner */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">⚔️</div>
      <div>
        <h1>SEVEN KNIGHTS <span>RE:BIRTH</span></h1>
        <p>BULK COUPON REDEEMER // gameCode: tskgb</p>
      </div>
      <div class="header-badge">v1.1</div>
    </div>

    <!-- Input grid -->
    <div class="grid">
      <div class="card">
        <div class="card-title">Player UIDs</div>
        <textarea id="uids" rows="8"
          placeholder="Enter one UID per line:&#10;ABCDEF1234567890...&#10;ABCDEF1234567890..."></textarea>
        <div class="count-badge" id="uid-count">0 UIDs</div>
      </div>
      <div class="card" id="codes-card">
        <div class="card-title">Coupon Codes</div>
        <textarea id="codes" rows="8" placeholder="Enter one coupon code per line:&#10;SKRE300BIRTH&#10;SKREBDAY2025..."
          style="display:none"></textarea>
        <div class="count-badge" id="code-count">0 codes</div>
      </div>
    </div>

    <!-- Settings Removed -->

    <!-- Buttons -->
    <div class="btn-row" style="align-items:center">
      <button class="btn-primary" id="btn-start" onclick="startBulk()">
        <div class="spinner" id="start-spinner" style="display:none"></div>
        <span id="start-label">▶ START BULK REDEEM</span>
      </button>
      <button class="btn-stop" id="btn-stop" onclick="stopBulk()" style="display:none">
        ⬛ STOP
      </button>
      <button class="btn-secondary" onclick="clearAll()">✕ CLEAR ALL</button>

      <div style="width:1px; height:24px; background:var(--border); margin:0 4px"></div>

      <select id="code-source"
        style="width:140px; font-size:11px; padding:7px; font-family:var(--font-mono); background:var(--surface); color:var(--text); border:1px solid var(--border); box-shadow:0 1px 2px rgba(0,0,0,0.05); border-radius:6px; outline:none; height:36px; cursor:pointer;"
        onchange="toggleCodeMode()">
        <option value="global">Community Codes</option>
        <option value="manual">Manual Input</option>
      </select>

      <button class="btn-secondary" id="btn-add-global" style="padding:0 16px; font-size:11px; height:36px;"
        onclick="openAddCodeModal()">+ ADD CODE</button>
    </div>

    <!-- Custom Popup Modal -->
    <div id="add-code-modal"
      style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.6); z-index:999; align-items:center; justify-content:center; backdrop-filter:blur(2px);">
      <div
        style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; width:340px; box-shadow:0 20px 40px rgba(0,0,0,0.1);">
        <div
          style="font-family:var(--font-head); font-weight:700; font-size:18px; margin-bottom:12px; letter-spacing:1px; color:var(--text)">
          ADD COMMUNITY CODE</div>
        <input type="text" id="modal-code-input" placeholder="Enter coupon code..."
          style="width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:6px; font-family:var(--font-mono); outline:none; font-size:13px; margin-bottom:20px;">
        <div style="display:flex; justify-content:flex-end; gap:12px;">
          <button class="btn-secondary" style="padding:8px 16px; font-size:12px; height:auto"
            onclick="closeAddCodeModal()">CANCEL</button>
          <button class="btn-primary" id="btn-modal-submit" style="padding:8px 16px; font-size:12px; height:auto"
            onclick="submitNewCode()">SUBMIT</button>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-card" id="progress-section" style="display:none">
      <div class="progress-header">
        <span id="progress-label" style="color:var(--muted)">Initializing...</span>
        <span id="progress-pct" style="color:var(--gold); font-family:var(--font-mono)">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-bar"></div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Total</div>
          <div class="stat-value total" id="s-total">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Success</div>
          <div class="stat-value success" id="s-ok">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Failed</div>
          <div class="stat-value fail" id="s-fail">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Skipped</div>
          <div class="stat-value skip" id="s-skip">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Remaining</div>
          <div class="stat-value" id="s-remain" style="color:var(--text)">0</div>
        </div>
      </div>
    </div>

    <!-- Results table -->
    <div class="results-card" id="results-section" style="display:none">
      <div class="log-header" style="margin-bottom:0">
        <div class="card-title" style="margin:0">Results</div>
        <span id="result-count" style="font-family:var(--font-mono);font-size:12px;color:var(--muted)"></span>
      </div>
      <div class="table-wrap">
        <table id="result-table">
          <thead>
            <tr>
              <th>#</th>
              <th>UID</th>
              <th>Coupon</th>
              <th>Status</th>
              <th>Validate</th>
              <th>Redeem Msg</th>
              <th>Reward</th>
            </tr>
          </thead>
          <tbody id="result-body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let running = false;
    let stopFlag = false;
    let results = [];
    let rowIndex = 0;

    // --- Live counts ---
    function parseLines(id) {
      return document.getElementById(id).value.split('\n').map(s => s.trim()).filter(Boolean);
    }
    document.getElementById('uids').addEventListener('input', () => {
      document.getElementById('uid-count').textContent = parseLines('uids').length + ' UIDs';
    });
    document.getElementById('codes').addEventListener('input', () => {
      if (document.getElementById('code-source').value === 'manual') {
        document.getElementById('code-count').textContent = parseLines('codes').length + ' codes';
      }
    });

    let globalCodesCache = [];

    function toggleCodeMode() {
      const mode = document.getElementById('code-source').value;

      const btnAdd = document.getElementById('btn-add-global');

      if (mode === 'manual') {
        document.getElementById('codes-card').style.display = '';
        document.querySelector('.grid').style.gridTemplateColumns = '';
        document.getElementById('codes').style.display = '';
        document.getElementById('code-count').textContent = parseLines('codes').length + ' codes';

        btnAdd.style.display = 'none';
      } else if (mode === 'global') {
        document.getElementById('codes-card').style.display = 'none';
        document.querySelector('.grid').style.gridTemplateColumns = '1fr';

        btnAdd.style.display = '';
      }
    }

    function openAddCodeModal() {
      document.getElementById('add-code-modal').style.display = 'flex';
      document.getElementById('modal-code-input').value = '';
      document.getElementById('modal-code-input').focus();
    }

    function closeAddCodeModal() {
      document.getElementById('add-code-modal').style.display = 'none';
    }

    async function fetchGlobalCodes() {
      try {
        const res = await fetch('/api/codes');
        const data = await res.json();
        globalCodesCache = Array.isArray(data) ? data : [];
        if (document.getElementById('code-source').value === 'global') {
          document.getElementById('code-count').textContent = globalCodesCache.length + ' global codes';
        }
      } catch (e) {
        console.error('Failed to load global codes', e);
      }
      toggleCodeMode();
    }
    window.addEventListener('DOMContentLoaded', fetchGlobalCodes);

    async function submitNewCode() {
      const input = document.getElementById('modal-code-input');
      const code = input.value.trim().toUpperCase();
      if (!code) return;

      const btn = document.getElementById('btn-modal-submit');
      input.disabled = true;
      btn.disabled = true;
      const originalBtnText = btn.textContent;
      btn.textContent = 'WAIT...';

      try {
        const res = await fetch('/api/codes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newCode: code })
        });
        const data = await res.json();
        if (data.success) {
          alert('Thanks for supporting community!');
          input.value = '';
          closeAddCodeModal();
          await fetchGlobalCodes();
        } else {
          alert('Failed: ' + (data.error || 'Invalid code'));
        }
      } catch (e) {
        alert('Error submitting code. Check backend.');
      }

      input.disabled = false;
      btn.disabled = false;
      btn.textContent = originalBtnText;
    }

    // --- Stats ---
    let stats = { total: 0, ok: 0, fail: 0, skip: 0 };
    function updateStats(done) {
      document.getElementById('s-total').textContent = stats.total;
      document.getElementById('s-ok').textContent = stats.ok;
      document.getElementById('s-fail').textContent = stats.fail;
      document.getElementById('s-skip').textContent = stats.skip;
      document.getElementById('s-remain').textContent = stats.total - done;
      const pct = stats.total ? Math.round((done / stats.total) * 100) : 0;
      document.getElementById('prog-bar').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
    }

    // --- Detect environment: use proxy when hosted, direct when local file ---
    const IS_LOCAL = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    // --- Validate GET ---
    async function validateCoupon(uid, code) {
      try {
        let r;
        if (IS_LOCAL) {
          const url = `https://coupon.netmarble.com/api/coupon/reward?gameCode=tskgb&couponCode=${encodeURIComponent(code)}&langCd=TH_TH&pid=${encodeURIComponent(uid)}`;
          r = await fetch(url, { method: 'GET' });
        } else {
          const url = `/api/validate?couponCode=${encodeURIComponent(code)}&pid=${encodeURIComponent(uid)}`;
          r = await fetch(url, { method: 'GET' });
        }
        return await r.json();
      } catch (e) {
        return { success: false, errorCode: -1, errorMessage: e.message };
      }
    }

    // --- Redeem POST ---
    async function redeemCoupon(uid, code) {
      try {
        let r;
        if (IS_LOCAL) {
          r = await fetch('https://coupon.netmarble.com/api/coupon', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gameCode: 'tskgb', couponCode: code, langCd: 'TH_TH', pid: uid })
          });
        } else {
          r = await fetch('/api/redeem', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ couponCode: code, pid: uid })
          });
        }
        return await r.json();
      } catch (e) {
        return { success: false, errorCode: -1, errorMessage: e.message };
      }
    }

    // --- Add result row ---
    function addRow(uid, code, validateRes, redeemRes) {
      rowIndex++;
      const tbody = document.getElementById('result-body');
      const tr = document.createElement('tr');

      let status, tagClass;
      if (redeemRes && redeemRes.success) { status = 'SUCCESS'; tagClass = 'tag-SUCCESS'; }
      else if (redeemRes && !redeemRes.success) { status = 'FAIL'; tagClass = 'tag-FAIL'; }
      else if (validateRes && !validateRes.success) { status = 'SKIP'; tagClass = 'tag-SKIP'; }
      else { status = 'SKIP'; tagClass = 'tag-SKIP'; }

      const validateMsg = validateRes ? (validateRes.success ? '✓ valid' : `✗ ${validateRes.errorMessage || validateRes.errorCode}`) : '—';
      const redeemMsg = redeemRes ? (redeemRes.success ? '✓ sent' : `✗ ${redeemRes.errorMessage || redeemRes.errorCode}`) : '—';
      const reward = validateRes?.rewardType ? validateRes.resultData?.[0]?.productName || validateRes.rewardType : '—';

      tr.innerHTML = `
    <td style="color:var(--muted)">${rowIndex}</td>
    <td title="${uid}">${uid.length > 20 ? uid.slice(0, 20) + '…' : uid}</td>
    <td>${code}</td>
    <td><span class="tag ${tagClass}">${status}</span></td>
    <td style="color:var(--muted)">${validateMsg}</td>
    <td style="color:var(--muted)">${redeemMsg}</td>
    <td style="color:var(--gold)">${reward}</td>
  `;
      tbody.appendChild(tr);
      document.getElementById('result-count').textContent = rowIndex + ' rows';
      document.getElementById('results-section').style.display = '';

      results.push({ no: rowIndex, uid, code, status, validateMsg, redeemMsg, reward });
    }

    // --- Delay ---
    const sleep = ms => new Promise(res => setTimeout(res, ms));

    // --- Main ---
    async function startBulk() {
      if (running) return;

      const uids = parseLines('uids');
      let codes = [];

      if (document.getElementById('code-source').value === 'manual') {
        codes = parseLines('codes');
      } else {
        await fetchGlobalCodes();
        codes = globalCodesCache;
      }

      if (!uids.length) { alert('No UIDs entered.'); return; }
      if (!codes.length) { alert('No coupon codes found.'); return; }

      const delayMs = 1000;

      // Build job pairs
      let pairs = [];
      for (const code of codes) {
        for (const uid of uids) {
          pairs.push([uid, code]);
        }
      }

      stats = { total: pairs.length, ok: 0, fail: 0, skip: 0 };
      rowIndex = 0;
      results = [];
      document.getElementById('result-body').innerHTML = '';
      document.getElementById('progress-section').style.display = '';
      document.getElementById('results-section').style.display = 'none';
      updateStats(0);

      running = true; stopFlag = false;
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-stop').style.display = '';
      document.getElementById('start-spinner').style.display = '';
      document.getElementById('start-label').textContent = 'RUNNING...';

      let done = 0;
      for (const [uid, code] of pairs) {
        if (stopFlag) { break; }

        document.getElementById('progress-label').textContent = `Processing: ${code} → ${uid.slice(0, 16)}...`;

        let validateRes = null, redeemRes = null;

        // Validate step
        validateRes = await validateCoupon(uid, code);
        if (!validateRes.success) {
          stats.skip++;
          done++;
          updateStats(done);
          addRow(uid, code, validateRes, null);
          await sleep(delayMs);
          continue;
        }

        // Redeem step
        redeemRes = await redeemCoupon(uid, code);
        if (redeemRes.success) {
          stats.ok++;
        } else {
          stats.fail++;
        }

        done++;
        updateStats(done);
        addRow(uid, code, validateRes, redeemRes);
        await sleep(delayMs);
      }

      running = false; stopFlag = false;
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-stop').style.display = 'none';
      document.getElementById('start-spinner').style.display = 'none';
      document.getElementById('start-label').textContent = '▶ START BULK REDEEM';
      document.getElementById('progress-label').textContent = 'Completed.';
    }

    function stopBulk() { stopFlag = true; }

    function clearAll() {
      document.getElementById('uids').value = '';
      document.getElementById('codes').value = '';
      document.getElementById('uid-count').textContent = '0 UIDs';
      toggleCodeMode();
      document.getElementById('result-body').innerHTML = '';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('progress-section').style.display = 'none';
      stats = { total: 0, ok: 0, fail: 0, skip: 0 };
      results = [];
      rowIndex = 0;
    }

  </script>
</body>

</html>
