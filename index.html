<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Re:Birth — Bulk Coupon Redeemer</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c14;
    --surface: #111422;
    --surface2: #181c2e;
    --border: #2a3050;
    --accent: #c8392b;
    --accent2: #e85d4a;
    --gold: #f0c040;
    --text: #d8ddf5;
    --muted: #6b738f;
    --success: #2eb87a;
    --warn: #e89a2e;
    --info: #4a8fe8;
    --font-head: 'Rajdhani', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --font-body: 'Exo 2', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,57,43,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,57,43,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 20px rgba(200,57,43,0.4);
    flex-shrink: 0;
  }
  .header h1 {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
  }
  .header h1 span { color: var(--accent2); }
  .header p {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 4px;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(200,57,43,0.15);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent2);
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .card-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Textarea */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .count-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gold);
    margin-top: 6px;
  }

  /* Settings row */
  .settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 600px) { .settings-row { grid-template-columns: 1fr; } }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

  button {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    padding: 11px 24px;
    transition: all .2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 rgba(200,57,43,0);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--accent2);
    box-shadow: 0 0 16px rgba(200,57,43,0.5);
    transform: translateY(-1px);
  }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .btn-stop {
    background: #1e1a10;
    color: var(--warn);
    border: 1px solid var(--warn);
  }
  .btn-stop:hover { background: rgba(232,154,46,0.15); }

  /* Progress */
  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .progress-header span { font-family: var(--font-mono); font-size: 13px; }
  .progress-bar-bg {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }
  .stats-row {
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .stat {
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-label { font-size: 10px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-family: var(--font-mono); font-size: 18px; font-weight: bold; }
  .stat-value.success { color: var(--success); }
  .stat-value.fail { color: var(--accent2); }
  .stat-value.skip { color: var(--warn); }
  .stat-value.total { color: var(--gold); }

  /* Log */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .log-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  #log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    height: 280px;
    overflow-y: auto;
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    scroll-behavior: smooth;
  }
  #log-box::-webkit-scrollbar { width: 6px; }
  #log-box::-webkit-scrollbar-track { background: transparent; }
  #log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .log-line { display: flex; gap: 10px; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-SUCCESS { color: var(--success); }
  .log-FAIL    { color: var(--accent2); }
  .log-SKIP    { color: var(--warn); }
  .log-INFO    { color: var(--info); }
  .log-WARN    { color: var(--warn); }

  /* Results table */
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .table-wrap {
    overflow-x: auto;
    margin-top: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  th {
    text-align: left;
    padding: 8px 12px;
    background: var(--surface2);
    color: var(--muted);
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 7px 12px;
    border-bottom: 1px solid rgba(42,48,80,0.5);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .tag-SUCCESS { background: rgba(46,184,122,0.15); color: var(--success); border: 1px solid rgba(46,184,122,0.3); }
  .tag-FAIL    { background: rgba(232,93,74,0.15);  color: var(--accent2); border: 1px solid rgba(232,93,74,0.3); }
  .tag-SKIP    { background: rgba(232,154,46,0.15); color: var(--warn);    border: 1px solid rgba(232,154,46,0.3); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: inline-block;
  }

  /* Pulse dot */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    animation: pulse 1.2s ease infinite;
  }

  .export-btn {
    margin-left: auto;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">⚔️</div>
    <div>
      <h1>SEVEN KNIGHTS <span>RE:BIRTH</span></h1>
      <p>BULK COUPON REDEEMER // gameCode: tskgb</p>
    </div>
    <div class="header-badge">v1.0</div>
  </div>

  <!-- Input grid -->
  <div class="grid">
    <div class="card">
      <div class="card-title">Player UIDs</div>
      <textarea id="uids" rows="8" placeholder="Enter one UID per line:&#10;ABCDEF1234567890...&#10;ABCDEF1234567890..."></textarea>
      <div class="count-badge" id="uid-count">0 UIDs</div>
    </div>
    <div class="card">
      <div class="card-title">Coupon Codes</div>
      <textarea id="codes" rows="8" placeholder="Enter one coupon code per line:&#10;SKRE300BIRTH&#10;SKREBDAY2025..."></textarea>
      <div class="count-badge" id="code-count">0 codes</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-row">
    <div class="field">
      <label>Delay between requests (ms)</label>
      <input type="number" id="delay" value="600" min="100" max="5000" step="100">
    </div>
    <div class="field">
      <label>Mode</label>
      <select id="mode">
        <option value="validate_then_redeem">Validate → Redeem</option>
        <option value="redeem_only">Redeem only (skip validate)</option>
        <option value="validate_only">Validate only (no redeem)</option>
      </select>
    </div>
    <div class="field">
      <label>Loop order</label>
      <select id="order">
        <option value="uid_outer">Each UID × all codes</option>
        <option value="code_outer">Each code × all UIDs</option>
      </select>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-primary" id="btn-start" onclick="startBulk()">
      <div class="spinner" id="start-spinner" style="display:none"></div>
      <span id="start-label">▶ START BULK REDEEM</span>
    </button>
    <button class="btn-stop" id="btn-stop" onclick="stopBulk()" style="display:none">
      ⬛ STOP
    </button>
    <button class="btn-secondary" onclick="clearAll()">✕ CLEAR ALL</button>
    <button class="btn-secondary export-btn" onclick="exportCSV()">⬇ EXPORT CSV</button>
  </div>

  <!-- Progress -->
  <div class="progress-card" id="progress-section" style="display:none">
    <div class="progress-header">
      <span id="progress-label" style="color:var(--muted)">Initializing...</span>
      <span id="progress-pct" style="color:var(--gold); font-family:var(--font-mono)">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar"></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value total" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">Success</div><div class="stat-value success" id="s-ok">0</div></div>
      <div class="stat"><div class="stat-label">Failed</div><div class="stat-value fail" id="s-fail">0</div></div>
      <div class="stat"><div class="stat-label">Skipped</div><div class="stat-value skip" id="s-skip">0</div></div>
      <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value" id="s-remain" style="color:var(--text)">0</div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-card">
    <div class="log-header">
      <div class="card-title" style="margin:0">Live Log</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="pulse-dot" id="pulse" style="display:none"></div>
        <button class="btn-secondary" style="padding:5px 12px;font-size:12px" onclick="document.getElementById('log-box').innerHTML=''">Clear</button>
      </div>
    </div>
    <div id="log-box"><span style="color:var(--muted);font-family:var(--font-mono);font-size:12px">Waiting to start...</span></div>
  </div>

  <!-- Results table -->
  <div class="results-card" id="results-section" style="display:none">
    <div class="log-header" style="margin-bottom:0">
      <div class="card-title" style="margin:0">Results</div>
      <span id="result-count" style="font-family:var(--font-mono);font-size:12px;color:var(--muted)"></span>
    </div>
    <div class="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th>#</th>
            <th>UID</th>
            <th>Coupon</th>
            <th>Status</th>
            <th>Validate</th>
            <th>Redeem Msg</th>
            <th>Reward</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let running = false;
let stopFlag = false;
let results = [];
let rowIndex = 0;

// --- Live counts ---
function parseLines(id) {
  return document.getElementById(id).value.split('\n').map(s=>s.trim()).filter(Boolean);
}
document.getElementById('uids').addEventListener('input', () => {
  document.getElementById('uid-count').textContent = parseLines('uids').length + ' UIDs';
});
document.getElementById('codes').addEventListener('input', () => {
  document.getElementById('code-count').textContent = parseLines('codes').length + ' codes';
});

// --- Log ---
function log(type, msg) {
  const box = document.getElementById('log-box');
  const now = new Date().toLocaleTimeString('en-GB', {hour12:false});
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${now}</span><span class="log-${type}">[${type}]</span><span>${msg}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

// --- Stats ---
let stats = {total:0, ok:0, fail:0, skip:0};
function updateStats(done) {
  document.getElementById('s-total').textContent = stats.total;
  document.getElementById('s-ok').textContent   = stats.ok;
  document.getElementById('s-fail').textContent = stats.fail;
  document.getElementById('s-skip').textContent = stats.skip;
  document.getElementById('s-remain').textContent = stats.total - done;
  const pct = stats.total ? Math.round((done/stats.total)*100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

// --- Detect environment: use proxy when hosted, direct when local file ---
const IS_LOCAL = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';

// --- Validate GET ---
async function validateCoupon(uid, code) {
  try {
    let r;
    if (IS_LOCAL) {
      const url = `https://coupon.netmarble.com/api/coupon/reward?gameCode=tskgb&couponCode=${encodeURIComponent(code)}&langCd=TH_TH&pid=${encodeURIComponent(uid)}`;
      r = await fetch(url, { method: 'GET' });
    } else {
      const url = `/api/validate?couponCode=${encodeURIComponent(code)}&pid=${encodeURIComponent(uid)}`;
      r = await fetch(url, { method: 'GET' });
    }
    return await r.json();
  } catch(e) {
    return { success: false, errorCode: -1, errorMessage: e.message };
  }
}

// --- Redeem POST ---
async function redeemCoupon(uid, code) {
  try {
    let r;
    if (IS_LOCAL) {
      r = await fetch('https://coupon.netmarble.com/api/coupon', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ gameCode: 'tskgb', couponCode: code, langCd: 'TH_TH', pid: uid })
      });
    } else {
      r = await fetch('/api/redeem', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ couponCode: code, pid: uid })
      });
    }
    return await r.json();
  } catch(e) {
    return { success: false, errorCode: -1, errorMessage: e.message };
  }
}

// --- Add result row ---
function addRow(uid, code, validateRes, redeemRes) {
  rowIndex++;
  const tbody = document.getElementById('result-body');
  const tr = document.createElement('tr');

  let status, tagClass;
  if (redeemRes && redeemRes.success) { status='SUCCESS'; tagClass='tag-SUCCESS'; }
  else if (redeemRes && !redeemRes.success) { status='FAIL'; tagClass='tag-FAIL'; }
  else if (validateRes && !validateRes.success) { status='SKIP'; tagClass='tag-SKIP'; }
  else { status='SKIP'; tagClass='tag-SKIP'; }

  const validateMsg = validateRes ? (validateRes.success ? '✓ valid' : `✗ ${validateRes.errorMessage||validateRes.errorCode}`) : '—';
  const redeemMsg   = redeemRes  ? (redeemRes.success  ? '✓ sent'  : `✗ ${redeemRes.errorMessage||redeemRes.errorCode}`)  : '—';
  const reward = validateRes?.rewardType ? validateRes.resultData?.[0]?.productName || validateRes.rewardType : '—';

  tr.innerHTML = `
    <td style="color:var(--muted)">${rowIndex}</td>
    <td title="${uid}">${uid.length>20?uid.slice(0,20)+'…':uid}</td>
    <td>${code}</td>
    <td><span class="tag ${tagClass}">${status}</span></td>
    <td style="color:var(--muted)">${validateMsg}</td>
    <td style="color:var(--muted)">${redeemMsg}</td>
    <td style="color:var(--gold)">${reward}</td>
  `;
  tbody.appendChild(tr);
  document.getElementById('result-count').textContent = rowIndex + ' rows';
  document.getElementById('results-section').style.display = '';

  results.push({ no: rowIndex, uid, code, status, validateMsg, redeemMsg, reward });
}

// --- Delay ---
const sleep = ms => new Promise(res => setTimeout(res, ms));

// --- Main ---
async function startBulk() {
  if (running) return;

  const uids  = parseLines('uids');
  const codes = parseLines('codes');
  if (!uids.length)  { log('WARN', 'No UIDs entered.'); return; }
  if (!codes.length) { log('WARN', 'No coupon codes entered.'); return; }

  const mode    = document.getElementById('mode').value;
  const order   = document.getElementById('order').value;
  const delayMs = parseInt(document.getElementById('delay').value) || 600;

  // Build job pairs
  let pairs = [];
  if (order === 'uid_outer') {
    for (const uid of uids) for (const code of codes) pairs.push([uid, code]);
  } else {
    for (const code of codes) for (const uid of uids) pairs.push([uid, code]);
  }

  stats = { total: pairs.length, ok:0, fail:0, skip:0 };
  rowIndex = 0;
  results = [];
  document.getElementById('result-body').innerHTML = '';
  document.getElementById('progress-section').style.display = '';
  document.getElementById('results-section').style.display = 'none';
  updateStats(0);

  running = true; stopFlag = false;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').style.display = '';
  document.getElementById('start-spinner').style.display = '';
  document.getElementById('pulse').style.display = '';
  document.getElementById('start-label').textContent = 'RUNNING...';
  log('INFO', `Starting — ${pairs.length} jobs | mode: ${mode} | delay: ${delayMs}ms`);

  let done = 0;
  for (const [uid, code] of pairs) {
    if (stopFlag) { log('WARN', 'Stopped by user.'); break; }

    document.getElementById('progress-label').textContent = `Processing: ${code} → ${uid.slice(0,16)}...`;

    let validateRes = null, redeemRes = null;

    // Validate step
    if (mode === 'validate_then_redeem' || mode === 'validate_only') {
      log('INFO', `Validating [${code}] for UID ${uid.slice(0,16)}…`);
      validateRes = await validateCoupon(uid, code);
      if (validateRes.success) {
        const rwd = validateRes.resultData?.[0]?.productName || '?';
        log('INFO', `  ✓ Valid — reward: ${rwd}`);
      } else {
        log('SKIP', `  ✗ Invalid [${code}] → ${validateRes.errorMessage || validateRes.errorCode}`);
        stats.skip++;
        done++;
        updateStats(done);
        addRow(uid, code, validateRes, null);
        await sleep(delayMs);
        continue;
      }
    }

    // Redeem step
    if (mode === 'validate_then_redeem' || mode === 'redeem_only') {
      log('INFO', `Redeeming [${code}] for UID ${uid.slice(0,16)}…`);
      redeemRes = await redeemCoupon(uid, code);
      if (redeemRes.success) {
        log('SUCCESS', `  ✓ Redeemed [${code}] → ${redeemRes.errorMessage || 'OK'}`);
        stats.ok++;
      } else {
        log('FAIL', `  ✗ Failed [${code}] → ${redeemRes.errorMessage || redeemRes.errorCode}`);
        stats.fail++;
      }
    } else {
      // validate_only path
      stats.ok++;
    }

    done++;
    updateStats(done);
    addRow(uid, code, validateRes, redeemRes);
    await sleep(delayMs);
  }

  running = false; stopFlag = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('start-spinner').style.display = 'none';
  document.getElementById('pulse').style.display = 'none';
  document.getElementById('start-label').textContent = '▶ START BULK REDEEM';
  document.getElementById('progress-label').textContent = 'Completed.';
  log('INFO', `Done! ✓ ${stats.ok} success | ✗ ${stats.fail} fail | ⊘ ${stats.skip} skip`);
}

function stopBulk() { stopFlag = true; }

function clearAll() {
  document.getElementById('uids').value = '';
  document.getElementById('codes').value = '';
  document.getElementById('uid-count').textContent = '0 UIDs';
  document.getElementById('code-count').textContent = '0 codes';
  document.getElementById('log-box').innerHTML = '<span style="color:var(--muted);font-family:var(--font-mono);font-size:12px">Cleared.</span>';
  document.getElementById('result-body').innerHTML = '';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('progress-section').style.display = 'none';
  stats = {total:0,ok:0,fail:0,skip:0};
  results = [];
  rowIndex = 0;
}

function exportCSV() {
  if (!results.length) { log('WARN', 'No results to export.'); return; }
  const header = ['No','UID','Coupon','Status','Validate','Redeem','Reward'];
  const rows = results.map(r => [r.no, r.uid, r.code, r.status, r.validateMsg, r.redeemMsg, r.reward]);
  const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sk_rebirth_coupons_${Date.now()}.csv`;
  a.click();
  log('INFO', `Exported ${results.length} rows to CSV.`);
}
</script>
