<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7K AUTOMATE COUPON</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        textarea.form-control {
            resize: none;
            overflow: hidden;
        }

        .hidden {
            display: none;
        }

        .topup-dropdown-btn {
            min-height: 38px;
        }

        .topup-dropdown-btn::after {
            margin-left: auto;
        }

        .result-card {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
        }

        .result-summary {
            font-size: 14px;
            color: #6c757d;
        }

        .code-item {
            border-bottom: 1px solid #f1f3f5;
        }

        .code-item:last-child {
            border-bottom: none;
        }

        .mono {
            font-family: Consolas, Monaco, monospace;
        }
    </style>
</head>

<body>
    <div class="container mt-4 mb-5">
        <div class="h1 text-center mt-5 mb-4">7K AUTOMATE COUPON</div>

        <div class="w-100">
            <div class="row">
                <div class="col-12 col-md-8 mb-3">
                    <div class="input-group">
                        <textarea id="uidList" class="form-control"
                            placeholder="กรอก UID หลายรายการ, Enter เพื่อเพิ่ม UID ใหม่" rows="1"
                            oninput="autoResize(this)"></textarea>
                    </div>
                </div>

                <div class="col-12 col-md-4 mb-3">
                    <select id="topUpType" class="form-select d-none">
                        <option value="auto" selected>อัตโนมัติ</option>
                        <option value="manual">อัตโนมือ</option>
                    </select>

                    <div class="dropdown w-100">
                        <button id="topUpTypeDropdownBtn"
                            class="btn btn-light border dropdown-toggle w-100 text-start d-flex align-items-center shadow-sm topup-dropdown-btn"
                            type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            อัตโนมัติ
                        </button>

                        <ul class="dropdown-menu w-100 shadow">
                            <li>
                                <button type="button" class="dropdown-item active"
                                    onclick="setTopUpType('auto', 'อัตโนมัติ', this)">
                                    อัตโนมัติ
                                </button>
                            </li>
                            <li>
                                <button type="button" class="dropdown-item"
                                    onclick="setTopUpType('manual', 'อัตโนมือ', this)">
                                    อัตโนมือ
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div id="codeListWrapper" class="col-12 mb-3 hidden">
                <div class="input-group">
                    <textarea id="codeList" class="form-control"
                        placeholder="กรอกโค้ดหลายรายการ, Enter เพื่อเพิ่มโค้ดใหม่" rows="1"
                        oninput="autoResize(this)"></textarea>
                </div>
            </div>

            <button id="submitBtn" class="btn btn-success text-light w-100" onclick="topUpCoupon()">
                เติมโค้ด
            </button>

            <div class="mt-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h4 class="mb-0">ผลลัพธ์</h4>
                    <div id="resultSummary" class="result-summary"></div>
                </div>

                <div id="resultContainer"></div>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    const IS_LOCAL = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    const topUpTypeElement = document.getElementById("topUpType");
    const codeListWrapper = document.getElementById("codeListWrapper");
    const codeListElement = document.getElementById("codeList");
    const topUpTypeDropdownBtn = document.getElementById("topUpTypeDropdownBtn");
    const resultContainer = document.getElementById("resultContainer");
    const resultSummary = document.getElementById("resultSummary");
    const submitBtn = document.getElementById("submitBtn");

    let topUpResults = [];

    // ── Resize textarea to fit content ──────────────────────────────────────
    function autoResize(el) {
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
    }

    function textAreaToList(value) {
        return value
            .split(/\r?\n/)
            .map(item => item.trim())
            .filter(Boolean);
    }

    function updateCodeListVisibility() {
        const type = topUpTypeElement.value;
        if (type === "manual") {
            codeListWrapper.classList.remove("hidden");
            autoResize(codeListElement);
        } else {
            codeListWrapper.classList.add("hidden");
            codeListElement.value = "";
            codeListElement.style.height = "auto";
        }
    }

    function setTopUpType(value, label, clickedElement) {
        topUpTypeElement.value = value;
        topUpTypeDropdownBtn.textContent = label;
        document.querySelectorAll(".dropdown-menu .dropdown-item").forEach(item => {
            item.classList.remove("active");
        });
        clickedElement.classList.add("active");
        topUpTypeElement.dispatchEvent(new Event("change"));
    }

    // ── SweetAlert2 helpers ─────────────────────────────────────────────────
    function showWarning(message) {
        Swal.fire({ icon: "warning", title: "แจ้งเตือน", text: message, confirmButtonText: "ตกลง" });
    }

    function showSuccess(message) {
        Swal.fire({ icon: "success", title: "สำเร็จ", text: message, confirmButtonText: "ตกลง" });
    }

    function showError(message) {
        Swal.fire({ icon: "error", title: "เกิดข้อผิดพลาด", text: message, confirmButtonText: "ตกลง" });
    }

    function showLoading() {
        Swal.fire({
            title: "กำลังดำเนินการ...",
            text: "กำลังเติมให้ครับปรี๊ ใจเย็นๆ",
            allowOutsideClick: false,
            allowEscapeKey: false,
            showConfirmButton: false,
            didOpen: () => { Swal.showLoading(); }
        });
    }

    function hideLoading() { Swal.close(); }

    // ── HTML escape ─────────────────────────────────────────────────────────
    function escapeHtml(value = "") {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function getBadgeClass(status) {
        if (status === "success") return "text-bg-success";
        if (status === "pending") return "text-bg-secondary";
        return "text-bg-danger";
    }

    function getStatusLabel(status) {
        if (status === "success") return "สำเร็จ";
        if (status === "pending") return "รอดำเนิน";
        return "ไม่สำเร็จ";
    }

    function countUidStats(codeResults = []) {
        let success = 0, failed = 0;
        codeResults.forEach(item => {
            if (item.status === "success") success++;
            else if (item.status !== "pending") failed++;
        });
        return { success, failed };
    }

    function updateSummary() {
        let success = 0, failed = 0;
        topUpResults.forEach(uidItem => {
            uidItem.codes.forEach(codeItem => {
                if (codeItem.status === "success") success++;
                else if (codeItem.status !== "pending") failed++;
            });
        });
        resultSummary.textContent = topUpResults.length
            ? `UID ${topUpResults.length} รายการ | สำเร็จ ${success} | ไม่สำเร็จ ${failed}`
            : "";
    }

    function renderResults() {
        if (!topUpResults.length) {
            resultContainer.innerHTML = `
                <div class="text-muted border rounded-3 p-3 bg-light">
                    ยังไม่มีผลลัพธ์
                </div>
            `;
            resultSummary.textContent = "";
            return;
        }

        const accordionId = "uidResultAccordion";
        resultContainer.innerHTML = `
        <div class="accordion" id="${accordionId}">
            ${topUpResults.map((uidItem, uidIndex) => {
                const collapseId = `collapse-${uidIndex}`;
                const headingId  = `heading-${uidIndex}`;
                const stats      = countUidStats(uidItem.codes);
                return `
                    <div class="accordion-item result-card mb-2">
                        <h2 class="accordion-header" id="${headingId}">
                            <button class="accordion-button collapsed" type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#${collapseId}"
                                aria-expanded="false"
                                aria-controls="${collapseId}">
                                <div class="w-100 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 pe-2">
                                    <div>
                                        <div class="fw-semibold">
                                            UID <span class="mono">${escapeHtml(uidItem.uid)}</span>
                                        </div>
                                    </div>
                                    <div class="d-flex flex-wrap gap-2">
                                        <span class="badge text-bg-success">สำเร็จ ${stats.success}</span>
                                        <span class="badge text-bg-danger">ไม่สำเร็จ ${stats.failed}</span>
                                    </div>
                                </div>
                            </button>
                        </h2>
                        <div id="${collapseId}" class="accordion-collapse collapse"
                            aria-labelledby="${headingId}">
                            <div class="accordion-body p-0">
                                ${uidItem.codes.map(codeItem => `
                                    <div class="code-item p-3">
                                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                                            <div class="ps-3 ps-md-4">
                                                <div class="fw-semibold mono">${escapeHtml(codeItem.code)}</div>
                                                ${codeItem.message ? `<div class="text-muted small">${escapeHtml(codeItem.message)}</div>` : ''}
                                            </div>
                                            <div class="d-flex align-items-center gap-2">
                                                <span class="badge ${getBadgeClass(codeItem.status)}">${getStatusLabel(codeItem.status)}</span>
                                            </div>
                                        </div>
                                    </div>
                                `).join("")}
                            </div>
                        </div>
                    </div>
                `;
            }).join("")}
        </div>`;

        updateSummary();
    }

    function createInitialResults(uidList, codeListByUid) {
        return uidList.map(uid => ({
            uid,
            codes: (codeListByUid[uid] || []).map(code => ({
                code,
                status: "pending",
                message: ""
            }))
        }));
    }

    function updateCodeResult(uid, code, patch) {
        const uidItem  = topUpResults.find(item => item.uid === uid);
        if (!uidItem) return;
        const codeItem = uidItem.codes.find(item => item.code === code);
        if (!codeItem) return;
        Object.assign(codeItem, patch);
        renderResults();
    }

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    // ── API calls — proxy on hosted, direct on local ────────────────────────
    async function validateCoupon(uid, code) {
        try {
            let r;
            if (IS_LOCAL) {
                const url = `https://coupon.netmarble.com/api/coupon/reward?gameCode=tskgb&couponCode=${encodeURIComponent(code)}&langCd=TH_TH&pid=${encodeURIComponent(uid)}`;
                r = await fetch(url);
            } else {
                r = await fetch(`/api/validate?couponCode=${encodeURIComponent(code)}&pid=${encodeURIComponent(uid)}`);
            }
            return await r.json();
        } catch (e) {
            return { success: false, errorCode: -1, errorMessage: e.message };
        }
    }

    async function redeemCoupon(uid, code) {
        try {
            let r;
            if (IS_LOCAL) {
                r = await fetch('https://coupon.netmarble.com/api/coupon', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameCode: 'tskgb', couponCode: code, langCd: 'TH_TH', pid: uid })
                });
            } else {
                r = await fetch('/api/redeem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ couponCode: code, pid: uid })
                });
            }
            return await r.json();
        } catch (e) {
            return { success: false, errorCode: -1, errorMessage: e.message };
        }
    }

    async function fetchAutoCodeList() {
        try {
            const r    = await fetch('/api/codes');
            const data = await r.json();
            return Array.isArray(data) ? data : [];
        } catch {
            return [];
        }
    }

    // ── Core processing loop ────────────────────────────────────────────────
    async function processTopUp(uidList, codeListByUid) {
        topUpResults = createInitialResults(uidList, codeListByUid);
        renderResults();

        for (const uid of uidList) {
            const codes = codeListByUid[uid] || [];

            for (const code of codes) {
                try {
                    // Step 1: validate
                    const validateRes = await validateCoupon(uid, code);
                    if (!validateRes.success) {
                        updateCodeResult(uid, code, {
                            status: "failed",
                            message: validateRes.errorMessage || `ไม่ผ่านการตรวจ (${validateRes.errorCode})`
                        });
                        await sleep(600);
                        continue;
                    }

                    // Step 2: redeem
                    const redeemRes = await redeemCoupon(uid, code);
                    if (redeemRes.success) {
                        const reward = redeemRes?.resultData?.[0]?.productName || "";
                        updateCodeResult(uid, code, {
                            status: "success",
                            message: reward ? `รางวัล: ${reward}` : ""
                        });
                    } else {
                        updateCodeResult(uid, code, {
                            status: "failed",
                            message: redeemRes.errorMessage || `รหัส ${redeemRes.errorCode}`
                        });
                    }

                    await sleep(600);
                } catch (error) {
                    updateCodeResult(uid, code, { status: "failed", message: error?.message || "" });
                }
            }
        }
    }

    // ── Main entry point ────────────────────────────────────────────────────
    async function topUpCoupon() {
        const type          = topUpTypeElement.value;
        const uidList       = textAreaToList(document.getElementById("uidList").value);
        const manualCodeList = textAreaToList(document.getElementById("codeList").value);

        if (uidList.length === 0) {
            showWarning("กรุณากรอก UID อย่างน้อย 1 รายการ");
            return;
        }

        if (type === "manual" && manualCodeList.length === 0) {
            showWarning("กรุณากรอก Code อย่างน้อย 1 รายการ");
            return;
        }

        try {
            submitBtn.disabled = true;
            showLoading();

            let codeListByUid = {};

            if (type === "manual") {
                uidList.forEach(uid => { codeListByUid[uid] = [...manualCodeList]; });
            } else {
                const codes = await fetchAutoCodeList();
                if (!codes.length) throw new Error("ไม่พบ code list จากระบบอัตโนมัติ");
                uidList.forEach(uid => { codeListByUid[uid] = [...codes]; });
            }

            hideLoading();
            await processTopUp(uidList, codeListByUid);
            showSuccess("ดำเนินการเสร็จเรียบร้อย");
        } catch (error) {
            hideLoading();
            showError(error?.message || "ไม่สามารถดำเนินการได้");
        } finally {
            submitBtn.disabled = false;
        }
    }

    topUpTypeElement.addEventListener("change", updateCodeListVisibility);
    updateCodeListVisibility();
    renderResults();
</script>
